apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "rss2discord-operator.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - rss2discord.maverickd650.dev
  resources:
  - feedgroups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rss2discord.maverickd650.dev
  resources:
  - feedgroups/finalizers
  verbs:
  - update
- apiGroups:
  - rss2discord.maverickd650.dev
  resources:
  - feedgroups/status
  verbs:
  - get
  - patch
  - update
