{{- if .Values.crd.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: feedgroups.rss2discord.maverickd650.dev
spec:
  group: rss2discord.maverickd650.dev
  names:
    kind: FeedGroup
    listKind: FeedGroupList
    plural: feedgroups
    singular: feedgroup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: FeedGroup is the Schema for the feedgroups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FeedGroupSpec defines the desired state of a FeedGroup.
            properties:
              catchUpLimit:
                default: 5
                description: |-
                  CatchUpLimit caps how many backlog entries are sent to Discord the
                  first time a feed is reconciled (i.e. before it has a recorded
                  LastSeenEntry). Without this, adding a feed with a long history
                  floods the webhook with every existing entry at once. Entries beyond
                  the limit are treated as already seen and are not sent.
                type: integer
              discordWebhookSecretRef:
                description: |-
                  DiscordWebhookSecretRef points to the Secret containing the Discord webhook URL.
                  The secret must contain the webhook URL under the specified key.
                properties:
                  key:
                    description: The key of the secret to select from.  Must be a
                      valid secret key.
                    type: string
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  optional:
                    description: Specify whether the Secret or its key must be defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              feeds:
                description: Feeds is the list of RSS feed configurations in this
                  group.
                items:
                  description: FeedSpec defines the configuration for a single RSS
                    feed.
                  properties:
                    filter:
                      description: Filter defines how to filter entries from this
                        feed.
                      properties:
                        keywords:
                          description: Keywords is a list of keywords to match (OR
                            logic).
                          items:
                            type: string
                          type: array
                        regex:
                          description: Regex is a regular expression to match against
                            entry title/description.
                          type: string
                      type: object
                    format:
                      description: |-
                        Format is the template for Discord messages for this feed.
                        Overrides the group-level format if set.
                      type: string
                    paused:
                      description: Paused stops processing this feed if set to true.
                      type: boolean
                    rssUrl:
                      description: RSSUrl is the URL of the RSS feed to fetch. Only
                        http:// and https:// are supported.
                      pattern: ^https?://
                      type: string
                  required:
                  - rssUrl
                  type: object
                type: array
              format:
                default: |-
                  **{{ "{{.Title}}" }}**
                  {{ "{{.Description}}" }}
                  [Read more]({{ "{{.Link}}" }})
                description: |-
                  Format is the default template for Discord messages.
                  Supports placeholders: {{ "{{.Title}}" }}, {{ "{{.Description}}" }}, {{ "{{.Link}}" }}, {{ "{{.Published}}" }}.
                type: string
              interval:
                default: 30m
                description: Interval is the duration between feed checks (e.g., "30m",
                  "1h").
                type: string
              retries:
                default: 3
                description: Retries is the number of times to retry failed operations
                  (fetch/send).
                type: integer
              retryInterval:
                default: 5m
                description: RetryInterval is the duration between retries (e.g.,
                  "5m").
                type: string
            required:
            - discordWebhookSecretRef
            - feeds
            type: object
          status:
            description: FeedGroupStatus defines the observed state of a FeedGroup.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the FeedGroup's
                  overall state, following the standard Kubernetes condition conventions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastChecked:
                additionalProperties:
                  type: string
                description: LastChecked is a map of feed URL to the last time it
                  was checked (RFC3339 timestamp).
                type: object
              lastError:
                additionalProperties:
                  type: string
                description: LastError is a map of feed URL to the last error encountered.
                type: object
              lastSeenEntry:
                additionalProperties:
                  type: string
                description: |-
                  LastSeenEntry is a map of feed URL to the last seen entry identifier (GUID or Link).
                  Used to fetch only new entries after restarts.
                type: object
              lastSent:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  LastSent is a map of feed URL to a map of entry hash to timestamp (RFC3339).
                  Tracks which entries have been sent to Discord to avoid duplicates.
                type: object
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed for this FeedGroup
                  by the controller.
                format: int64
                type: integer
              retryCount:
                additionalProperties:
                  type: integer
                description: RetryCount is a map of feed URL to the number of consecutive
                  retries.
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
