## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  ## Set to false to skip manager installation
  ##
  enabled: true

  replicas: 1

  image:
    repository: ghcr.io/maverickd650/rss2discord-operator
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## Deployment strategy
  ##
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%

  ## Priority class name
  ##
  # priorityClassName: ""

  ## Topology spread constraints
  ##
  # topologySpreadConstraints: []

  ## Termination grace period seconds
  ##
  terminationGracePeriodSeconds: 10

  ## Custom Deployment labels
  ##
  # labels: {}

  ## Custom Deployment annotations
  ##
  # annotations: {}

  ## Custom Pod labels and annotations
  ##
  # pod:
  #   labels: {}
  #   annotations: {}

## RBAC configuration
##
rbac:
  ## RBAC resource scope
  ## - false (default): ClusterRole/ClusterRoleBinding (all namespaces)
  ## - true: Role/RoleBinding (release namespace only)
  ##
  namespaced: false

  ## Helper roles for CRD management (admin/editor/viewer)
  ##
  helpers:
    ## Install convenience admin/editor/viewer roles for CRDs
    ##
    enabled: false

## ServiceAccount configuration
##
serviceAccount:
  # Install default ServiceAccount provided
  enabled: true

  ## Existing ServiceAccount name (only when enabled=false)
  ## Note: When enabled=true, respects nameOverride/fullnameOverride
  ##
  # name: ""

  ## Custom ServiceAccount annotations
  ##
  # annotations: {}

  ## Custom ServiceAccount labels
  ##
  # labels: {}

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enabled: true
  # Keep CRDs when uninstalling
  keep: false

## Controller metrics endpoint.
## Enable to expose /metrics endpoint
##
metrics:
  enabled: true
  # Metrics server port
  port: 8443
  # Enable secure metrics: HTTPS with certs/auth (true) or HTTP (false).
  # Note: Metrics authn/authz needs ClusterRole access.
  secure: true

## Cert-manager integration for TLS certificates.
## Required for metrics endpoint certificates.
##
certManager:
  enabled: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enabled: false

## PrometheusRule alerting on the rss2discord_feed_operations_total metric.
## Requires prometheus-operator to be installed in the cluster.
##
prometheusRule:
  enabled: false
  ## Window over which fetch_error/send_error/rate_limited rates are evaluated
  ##
  rateInterval: 15m
  ## How long an outcome must persist before the alert fires
  ##
  for: 15m
  ## Severity label applied to all generated alerts
  ##
  severity: warning
  ## Extra labels added to the PrometheusRule (e.g. to match a Prometheus ruleSelector)
  ##
  # labels: {}

## Grafana dashboard for rss2discord-operator's feed metrics.
## Rendered as a GrafanaDashboard custom resource for the grafana-operator
## (https://github.com/grafana/grafana-operator), which syncs it into any
## matching Grafana instance.
##
grafanaDashboard:
  enabled: false
  ## Namespace for the ConfigMap and GrafanaDashboard CR (defaults to the
  ## release namespace).
  ##
  # namespace: ""
  ## Lets the GrafanaDashboard CR (in this release's namespace) be picked up
  ## by a Grafana CR in a different namespace.
  ##
  allowCrossNamespaceImport: true
  ## Label selector matching the target Grafana custom resource(s). Left
  ## empty (the default), the grafana-operator matches every Grafana CR it
  ## manages.
  ##
  instanceSelector:
    matchLabels: {}
  ## How often the operator re-syncs this dashboard into Grafana.
  ##
  resyncPeriod: 30s
  ## Grafana folder to file the dashboard under. Leave unset for the default
  ## folder.
  ##
  # folder: ""
  ## Maps the dashboard's ${DS_PROMETHEUS} placeholder to a real datasource,
  ## by name, before the operator pushes the dashboard into Grafana. Adjust
  ## datasourceName to match your Prometheus datasource's name in Grafana.
  ##
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: prometheus
  ## Extra labels and annotations added to the ConfigMap and GrafanaDashboard CR
  ##
  # labels: {}
  # annotations: {}

## Network policies for controlling traffic flow.
## Enable to restrict ingress to the controller manager.
##
networkPolicy:
  enabled: false

