# This rule is not used by the project rss2discord-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over rss2discord.rss2discord.maverickd650.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rss2discord-operator
    app.kubernetes.io/managed-by: kustomize
  name: feedgroup-admin-role
rules:
- apiGroups:
  - rss2discord.rss2discord.maverickd650.dev
  resources:
  - feedgroups
  verbs:
  - '*'
- apiGroups:
  - rss2discord.rss2discord.maverickd650.dev
  resources:
  - feedgroups/status
  verbs:
  - get
