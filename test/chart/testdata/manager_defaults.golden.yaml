---
# Source: rss2discord-operator/templates/manager/manager.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: rss2discord-operator
    helm.sh/chart: SCRUBBED
    app.kubernetes.io/instance: chart-golden-test
    control-plane: controller-manager
  name: chart-golden-test-rss2discord-operator
  namespace: chart-golden-test-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rss2discord-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: rss2discord-operator
        helm.sh/chart: SCRUBBED
        app.kubernetes.io/instance: chart-golden-test
        app.kubernetes.io/managed-by: Helm
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --health-probe-bind-address=:8081
        - --leader-elect
        command:
        - /manager
        image: "ghcr.io/maverickd650/rss2discord-operator:golden-test"
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
          []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: chart-golden-test-rss2discord-operator
      terminationGracePeriodSeconds: 10
      volumes:
        []

