name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]
  schedule:
    # Weekly scan to catch advisories published after the last code change.
    - cron: "27 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # to upload SARIF results to code scanning
      contents: read # to checkout the code
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # Provide the Go toolchain so the extractor can resolve dependency
          # types. Only `go` is needed; skip the rest of the tool set.
          install_args: go
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          languages: go
          # `none` extracts directly from source without tracing a build. Manual
          # mode fails here because mise installs `go` as a PATH shim, which
          # CodeQL's build tracer can't follow ("no source code seen").
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          category: "/language:go"
