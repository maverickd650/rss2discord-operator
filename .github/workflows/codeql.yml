name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]
  schedule:
    # Weekly scan to catch advisories published after the last code change.
    - cron: "27 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # to upload SARIF results to code scanning
      contents: read # to checkout the code
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Use actions/setup-go rather than mise here: CodeQL's build tracer needs a
      # real `go` binary on PATH, and mise exposes `go` as a shim the tracer
      # can't follow (yields "no source code seen"). Version tracks go.mod.
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          languages: go
          build-mode: autobuild
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          category: "/language:go"
