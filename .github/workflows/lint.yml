name: Lint

on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env

      - name: Cache custom golangci-lint binary
        id: golangci-lint-custom-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: bin/golangci-lint-custom
          key: ${{ runner.os }}-golangci-lint-custom-${{ hashFiles('.custom-gcl.yml') }}

      - name: Mark restored binary fresh
        # mise's `golangci-lint-custom` task skips rebuilding when its output is newer
        # than .custom-gcl.yml; checkout always gives that file a fresh mtime, so without
        # this the cache hit would still trigger a rebuild every run.
        if: steps.golangci-lint-custom-cache.outputs.cache-hit == 'true'
        run: touch bin/golangci-lint-custom

      - name: Check linter configuration
        run: mise run lint-config

      - name: Run linter
        run: mise run lint
